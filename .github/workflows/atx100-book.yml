name: ATX-100 Book Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  atx100-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build standard docs outputs
        run: make docs-book

      - name: Upload ATX-100 master manual
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atx100-master-manual
          path: build/ATX-100-MASTER.md
          if-no-files-found: warn

      - name: Upload complete docs book
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atarix-docs-book
          path: build/ATARIX-DOCS-BOOK.md
          if-no-files-found: warn

      - name: Upload ATX-100 migration plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atx100-migration-plan
          path: build/ATX-100-MIGRATION-PLAN.md
          if-no-files-found: warn

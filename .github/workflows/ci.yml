name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            m4

      - name: Bootstrap
        run: sh bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check

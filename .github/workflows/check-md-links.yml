name: Check Markdown Links

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-md-links:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check local Markdown links
        run: python tools/check-md-links.py